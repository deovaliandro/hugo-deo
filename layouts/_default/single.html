{{ define "main" }}

<article class="max-w-4xl mx-auto">
  <header class="mb-2 mt-4">
    <h1 class="text-4xl font-bold leading-tight text-center">
      {{ .Title }}
    </h1>

    <time
      datetime="{{ .Date.Format "2006-01-02" }}"
      class="mt-3 block text-sm text-center">
      {{ .Date.Format "02 Jan 2006" }}
    </time>
  </header>

  <section class="
    text-lg
    leading-8

    [&_h2]:mt-6
    [&_h2]:mb-4
    [&_h2]:text-3xl
    [&_h2]:font-bold

    [&_h3]:mt-4
    [&_h3]:mb-3
    [&_h3]:text-2xl
    [&_h3]:font-semibold

    [&_p]:my-6

    [&_ul]:my-6
    [&_ul]:list-disc
    [&_ul]:pl-6

    [&_ol]:my-6
    [&_ol]:list-decimal
    [&_ol]:pl-6

    [&_a]:text-purple-700
    [&_a:hover]:underline

    [&_img]:rounded-lg
  ">
    {{ .Content }}
  </section>

</article>

{{ end }}
