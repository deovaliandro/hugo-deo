{{ define "main" }}

<h1 class="text-4xl font-bold leading-tight text-center">{{ .Title }}</h1>

<div class="flex flex-wrap gap-3">
    {{ range .Data.Terms.Alphabetical }}
    <a href="{{ .Page.RelPermalink }}"
        class="inline-flex items-center gap-2 rounded-full bg-orange-100 px-4 py-2 text-sm font-medium text-orange-800 transition-colors duration-200 hover:bg-orange-200 dark:bg-orange-900/30 dark:text-orange-300 dark:hover:bg-orange-900/50">
        <span>{{ .Page.Title }}</span>
        <span class="rounded-full bg-white/60 px-2 py-0.5 text-xs dark:bg-black/20">
            {{ .Count }}
        </span>
    </a>
    {{ end }}
</div>

{{ end }}
